name: API image

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: services/api/requirements.txt
      - run: pip install -r services/api/requirements.txt
      - run: pip install pip-audit==2.10.1 bandit==1.8.6
      - run: pip-audit -r services/api/requirements.txt
      - run: bandit -q -r services/api/app -lll
      - run: npm audit --audit-level=high --registry=https://registry.npmjs.org
      - run: pytest -q
        working-directory: services/api
        env:
          AGENTPULSE_ALLOW_DEFAULT_SECRET: '1'
          AGENTPULSE_DATABASE_URL: sqlite:////tmp/agentpulse-ci.sqlite3
          AGENTPULSE_DEEPSEEK_API_KEY: ''
          AGENTPULSE_HERMES_PROVISIONING: 'false'
          AGENTPULSE_TASK_WORKER_ENABLED: 'false'
          AGENTPULSE_BUSINESS_WORKER_ENABLED: 'false'

  build:
    needs: test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        id: meta
        with:
          images: ghcr.io/clycheng/agentpulse-api
          tags: |
            type=ref,event=tag
            type=sha,format=long
      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: services/api
          file: services/api/Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'
      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: deploy/Caddy.Dockerfile
          load: true
          tags: agentpulse-caddy:ci
          cache-from: type=gha,scope=caddy
          cache-to: type=gha,mode=max,scope=caddy
      - uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: agentpulse-caddy:ci
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'
