name: Desktop release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: npm
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: services/api/requirements.txt
      - run: npm ci
      - run: npm audit --audit-level=high --registry=https://registry.npmjs.org
      - run: npm run lint --workspace @agentpulse/desktop
      - run: pip install -r services/api/requirements.txt
      - run: pytest -q
        working-directory: services/api
        env:
          AGENTPULSE_ALLOW_DEFAULT_SECRET: '1'
          AGENTPULSE_DATABASE_URL: sqlite:////tmp/agentpulse-release-ci.sqlite3
          AGENTPULSE_DEEPSEEK_API_KEY: ''
          AGENTPULSE_HERMES_PROVISIONING: 'false'
          AGENTPULSE_TASK_WORKER_ENABLED: 'false'
          AGENTPULSE_BUSINESS_WORKER_ENABLED: 'false'
      - name: Match package version to tag
        shell: bash
        run: |
          test "v$(node -p "require('./apps/desktop/package.json').version")" = "${GITHUB_REF_NAME}"

  macos:
    needs: verify
    runs-on: macos-14
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run package:mac --workspace @agentpulse/desktop -- --arm64
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: desktop-macos
          path: |
            apps/desktop/release/AgentPulse-mac-arm64.dmg
            apps/desktop/release/AgentPulse-mac-arm64.zip
          if-no-files-found: error

  windows:
    needs: verify
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run package:win --workspace @agentpulse/desktop -- --x64
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: desktop-windows
          path: apps/desktop/release/AgentPulse-windows-x64.exe
          if-no-files-found: error

  publish:
    needs: [macos, windows]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: desktop-*
          path: release
          merge-multiple: true
      - name: Build checksums and release manifest
        shell: bash
        run: |
          cd release
          sha256sum AgentPulse-mac-arm64.dmg AgentPulse-mac-arm64.zip AgentPulse-windows-x64.exe > SHA256SUMS
          version="${GITHUB_REF_NAME#v}"
          published_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          jq -n \
            --arg version "$version" \
            --arg published_at "$published_at" \
            --arg mac_dmg_sha "$(sha256sum AgentPulse-mac-arm64.dmg | cut -d' ' -f1)" \
            --arg mac_zip_sha "$(sha256sum AgentPulse-mac-arm64.zip | cut -d' ' -f1)" \
            --arg windows_sha "$(sha256sum AgentPulse-windows-x64.exe | cut -d' ' -f1)" \
            '{
              version: $version,
              published_at: $published_at,
              minimum_api_version: "0.1.0",
              platforms: {
                macos_arm64: {
                  dmg_url: "https://github.com/Clycheng/agentpulse-releases/releases/latest/download/AgentPulse-mac-arm64.dmg",
                  dmg_sha256: $mac_dmg_sha,
                  zip_url: "https://github.com/Clycheng/agentpulse-releases/releases/latest/download/AgentPulse-mac-arm64.zip",
                  zip_sha256: $mac_zip_sha
                },
                windows_x64: {
                  url: "https://github.com/Clycheng/agentpulse-releases/releases/latest/download/AgentPulse-windows-x64.exe",
                  sha256: $windows_sha
                }
              }
            }' > latest.json
      - name: Publish assets to public release repository
        env:
          GH_TOKEN: ${{ secrets.RELEASES_REPO_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" release/* \
            --repo Clycheng/agentpulse-releases \
            --title "AgentPulse ${GITHUB_REF_NAME}" \
            --notes "Unsigned public alpha build. Verify SHA256SUMS before installation."
