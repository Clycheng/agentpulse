services:
  postgres:
    image: postgres:16-alpine
    container_name: agentpulse-postgres
    environment:
      POSTGRES_DB: agentpulse
      POSTGRES_USER: agentpulse
      POSTGRES_PASSWORD: agentpulse
    ports:
      - "55432:5432"
    volumes:
      - agentpulse_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentpulse -d agentpulse"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  agentpulse_postgres_data:
